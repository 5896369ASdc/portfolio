{% extends 'base.html' %}

{% block title %}
Contact | Divit
{% endblock %}

{% block content %}

<div style="max-width:500px; margin:auto; padding:30px;">

  <h2 style="text-align:center; margin-bottom:20px;">Contact Me</h2>

  {% if success %}
    <p style="color:green; text-align:center;">
      ✅ Message sent successfully!
    </p>
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Your Name" required
      style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc;">

    <input type="email" name="email" placeholder="Your Email" required
      style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid #ccc;">

    <textarea name="message" placeholder="Your Message" required
      style="width:100%; padding:10px; height:120px; border-radius:6px; border:1px solid #ccc;"></textarea>

    <button type="submit"
      style="margin-top:10px; width:100%; padding:10px; background:#2563eb; color:white; border:none; border-radius:6px;">
      Send Message
    </button>

  </form>

</div>

{% endblock %}
